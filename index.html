<!DOCTYPE html>
<html>
<head>
<title>ProfitPulse AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="slideshow"></div>

<div class="login-box">

<h1>ProfitPulse AI</h1>

<input id="name" placeholder="Enter your name">

<select id="language">
<option>English</option>
<option>Urdu</option>
</select>

<input id="country" placeholder="Detecting location..." readonly>

<button onclick="start()">Enter Dashboard</button>

</div>

<script>

fetch("https://ipapi.co/json/")
.then(res=>res.json())
.then(data=>{
document.getElementById("country").value = data.city + ", " + data.country_name
})

function start(){

let name=document.getElementById("name").value
localStorage.setItem("user",name)

window.location="dashboard.html"

}

</script>

</body>
</html>
