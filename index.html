<div class="overlay">
    <h1>BizVision AI</h1>
    <div class="login-container" style="display: flex; gap: 20px;">
        <div class="login-box">
            <h3>Entrepreneur</h3>
            <input id="email-e" placeholder="Email">
            <input id="pass-e" type="password" placeholder="Password">
            <button onclick="login('entrepreneur')">Enter as Founder</button>
        </div>

        <div class="login-box" style="border-left: 2px solid rgba(255,255,255,0.2);">
            <h3>Investor</h3>
            <input id="email-i" placeholder="Email">
            <input id="pass-i" type="password" placeholder="Password">
            <button onclick="login('investor')" style="background: #28a745;">Enter as Investor</button>
        </div>
    </div>
</div>
