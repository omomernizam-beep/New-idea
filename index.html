<!DOCTYPE html>
<html>
<head>

<title>ProfitPulse Login</title>

<style>

body{
background:#0B0F1A;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:#111827;
padding:40px;
border-radius:10px;
width:320px;
text-align:center;
}

input,select{
width:100%;
padding:10px;
margin-top:10px;
background:#0B0F1A;
border:1px solid #333;
color:white;
}

button{
margin-top:15px;
padding:12px;
width:100%;
background:#4F46E5;
border:none;
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<div class="box">

<h2>ProfitPulse</h2>

<input id="name" placeholder="Your Name">

<select id="language">
<option>English</option>
<option>Urdu</option>
</select>

<input id="country" placeholder="Detecting country..." readonly>

<button onclick="login()">Continue</button>

</div>

<script>

fetch("https://ipapi.co/json/")
.then(res=>res.json())
.then(data=>{
document.getElementById("country").value=data.country_name
})

function login(){

let name=document.getElementById("name").value
let country=document.getElementById("country").value
let language=document.getElementById("language").value

localStorage.setItem("name",name)
localStorage.setItem("country",country)
localStorage.setItem("language",language)

window.location="roadmap.html"

}

</script>

</body>
</html>
