<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ProfitPulse - Smart Business Insights</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="slideshow">
        <img src="slide1.jpg" class="slide active">
        <img src="slide2.jpg" class="slide">
        <img src="slide3.jpg" class="slide">
        <img src="slide4.jpg" class="slide">
    </div>

    <div class="overlay">
        <h1 style="font-size: 3.5rem; color: #00ffcc; margin-bottom: 5px;">ProfitPulse</h1>
        <p style="color: #e0e0e0; font-style: italic; margin-bottom: 30px;">"Strategic Capital Meets Visionary Execution."</p>
        
        <div class="login-container" style="display: flex; gap: 40px; background: rgba(0,0,0,0.7); padding: 50px; border-radius: 25px; backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1);">
            
            <div class="login-box">
                <h2 style="color: #00d4ff;">Founders</h2>
                <input id="email-e" placeholder="Founder Email">
                <input id="pass-e" type="password" placeholder="Password">
                <button onclick="login('entrepreneur')" style="width: 100%; background: #007bff;">Start Your Journey</button>
            </div>

            <div style="width: 1px; background: rgba(255,255,255,0.2);"></div>

            <div class="login-box">
                <h2 style="color: #2ecc71;">Investors</h2>
                <input id="email-i" placeholder="Investor Email">
                <input id="pass-i" type="password" placeholder="Password">
                <button onclick="login('investor')" style="width: 100%; background: #28a745;">Explore Ventures</button>
            </div>
        </div>
    </div>
    <script src="auth.js"></script>
    <script src="script.js"></script>
</body>
</html>
