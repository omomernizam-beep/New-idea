<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ProfitPulse - Smart Business Insights</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .split-container { display: flex; gap: 20px; margin-top: 20px; }
        .login-side { 
            background: rgba(255, 255, 255, 0.1); 
            padding: 30px; 
            border-radius: 15px; 
            flex: 1; 
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <div class="slideshow">
        <img src="slide1.jpg" class="slide active">
        <img src="slide2.jpg" class="slide">
        <img src="slide3.jpg" class="slide">
    </div>

    <div class="overlay">
        <h1 style="color: #00ffcc; font-size: 3rem; margin: 0;">ProfitPulse</h1>
        <p style="font-style: italic; color: #ccc;">"Bridging Visionary Founders with Strategic Capital"</p>

        <div class="split-container">
            <div class="login-side">
                <h2 style="color: #00d4ff;">Founders</h2>
                <input id="email-e" placeholder="Email">
                <input id="pass-e" type="password" placeholder="Password">
                <button onclick="login('entrepreneur')" style="width: 100%; background: #007bff;">Login to Pitch</button>
            </div>

            <div class="login-side">
                <h2 style="color: #2ecc71;">Investors</h2>
                <input id="email-i" placeholder="Email">
                <input id="pass-i" type="password" placeholder="Password">
                <button onclick="login('investor')" style="width: 100%; background: #28a745;">Login to Invest</button>
            </div>
        </div>
    </div>
    <script src="auth.js"></script>
    <script src="script.js"></script>
</body>
</html>
