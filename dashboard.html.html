<!DOCTYPE html>
<html>
<head>
    <title>Startup Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="slideshow">
        <img src="slide1.jpg" class="slide active">
        <img src="slide2.jpg" class="slide">
        <img src="slide3.jpg" class="slide">
        <img src="slide4.jpg" class="slide">
    </div>

    <div class="overlay">
        <div class="dashboard-card">
            <h1>Startup Dashboard</h1>
            
            <select id="city-select">
                <option value="">Select your city</option>
            </select>

            <br>
            <textarea id="idea" placeholder="Enter your business idea here..." style="width: 100%; height: 60px; margin-top: 10px; border-radius: 8px; padding: 10px;"></textarea>
            <br><br>

            <div class="button-group">
                <button onclick="generate()">AI Advice</button>
                <button onclick="calculateValuation()">Startup Valuation</button>
                <button onclick="findInvestor()">Find Investor</button>
                <button onclick="generatePDF()">Generate PDF</button>
            </div>

            <div id="result">Results will appear here...</div>
        </div>
    </div>

    <script src="cities.js"></script>
    <script src="ai.js"></script>
    <script src="valuation.js"></script>
    <script src="investor.js"></script>
    <script src="pdf.js"></script>
    <script src="script.js"></script>
</body>
</html>
