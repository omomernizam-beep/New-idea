<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ProfitPulse Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .dashboard-card {
            background: rgba(0, 0, 0, 0.8);
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 600px;
            text-align: center;
            border: 1px solid rgba(0, 255, 204, 0.3);
        }
        select, textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 8px;
            background: #222;
            color: white;
            border: 1px solid #444;
        }
        .btn-group { display: flex; gap: 10px; justify-content: center; }
        button {
            padding: 10px 15px;
            cursor: pointer;
            border-radius: 5px;
            border: none;
            font-weight: bold;
        }
        #pitch-wall {
            max-height: 400px;
            overflow-y: auto;
            text-align: left;
        }
    </style>
</head>
<body>
    <div class="slideshow">
        <img src="slide1.jpg" class="slide active">
        <img src="slide2.jpg" class="slide">
        <img src="slide3.jpg" class="slide">
    </div>

    <div class="overlay">
        <h1 style="color: #00ffcc;">ProfitPulse Portal</h1>

        <div id="entrepreneur-view" style="display:none;" class="dashboard-card">
            <h2>Founder's Corner</h2>
            <p>Select City & Pitch Your Idea</p>
            <select id="city-dropdown">
                <option value="">Loading Cities...</option>
            </select>
            <textarea id="idea-text" placeholder="Describe your business model and strategy..."></textarea>
            
            <div class="btn-group">
                <button onclick="generate()" style="background: #007bff; color: white;">AI Roadmap</button>
                <button onclick="publishPitch()" style="background: #28a745; color: white;">Publish Pitch</button>
                <button onclick="generatePDF()" style="background: #ffc107;">Download PDF</button>
            </div>
            <div id="result" style="margin-top: 20px;"></div>
        </div>

        <div id="investor-view" style="display:none;" class="dashboard-card">
            <h2 style="color: #2ecc71;">Investment Opportunities</h2>
            <div id="pitch-wall">
                </div>
        </div>

        <button onclick="window.location='index.html'" style="margin-top: 20px; background: transparent; border: 1px solid white; color: white;">Logout</button>
    </div>

    <script src="cities.js"></script> <script src="ai.js"></script>
    <script src="pdf.js"></script>
    <script src="script.js"></script>
</body>
</html>
