<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ProfitPulse Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .dashboard-card {
            background: rgba(0, 0, 0, 0.8);
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 600px;
            text-align: center;
            border: 1px solid rgba(0, 255, 204, 0.3);
        }
        select, textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 8px;
            background: #222;
            color: white;
            border: 1px solid #444;
        }
        button {
            padding: 10px 15px;
            cursor: pointer;
            border-radius: 5px;
            border: none;
            background: #007bff;
            color: white;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="slideshow">
        <img src="slide1.jpg" class="slide active">
        <img src="slide2.jpg" class="slide">
    </div>

    <div class="overlay">
        <h1 style="color: #00ffcc;">ProfitPulse Dashboard</h1>

        <div id="entrepreneur-view" style="display:none;" class="dashboard-card">
            <h2>Founder Section</h2>
            <select id="city-dropdown">
                <option value="">Searching cities...</option>
            </select>
            
            <textarea id="idea-text" placeholder="Apna business idea likhen..."></textarea>
            
            <div style="display: flex; gap: 10px; justify-content: center;">
                <button onclick="generate()">AI Roadmap</button>
                <button onclick="publishPitch()" style="background: #28a745;">Publish</button>
                <button onclick="generatePDF()" style="background: #ffc107; color: black;">PDF</button>
            </div>
            <div id="result"></div>
        </div>

        <div id="investor-view" style="display:none;" class="dashboard-card">
            <h2 style="color: #2ecc71;">Investor Feed</h2>
            <div id="pitch-wall"></div>
        </div>

        <button onclick="window.location='index.html'" style="margin-top: 20px; background: none; border: 1px solid white;">Logout</button>
    </div>
<script src="cities.js"></script>
    <script src="ai.js"></script>
    <script src="script.js"></script>
    <script src="pdf.js"></script>
</body>
    <script src="cities.js"></script>
    <script src="script.js"></script>
    <script src="ai.js"></script>
    <script src="pdf.js"></script>
</body>
</html>
