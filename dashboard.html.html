<!DOCTYPE html>
<html>

<head>

<title>ProfitPulse Business Analyzer</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>ProfitPulse Business Analyzer</h1>

<input type="text" id="idea" placeholder="Enter business idea">

<br>

<select id="city"></select>

<br>

<button onclick="analyze()">Generate Roadmap</button>

<div id="result"></div>

<script src="cities.js"></script>

<script>

let select=document.getElementById("city")

cities.forEach(c=>{

let option=document.createElement("option")

option.text=c.city+" - "+c.country

select.add(option)

})

function analyze(){

let idea=document.getElementById("idea").value

if(idea==""){

alert("Please enter business idea")

return

}

let output=`

<h2>Business Potential: Medium</h2>

<p>Recommended Location: High traffic markets</p>

<p>Startup Investment: 200k – 500k PKR</p>

<p>Break Even: 6 – 12 months</p>

<p>Growth Plan: Online + physical expansion</p>

`

document.getElementById("result").innerHTML=output

}

</script>

</body>
</html>
