<!DOCTYPE html>
<html lang="en">
<head>
    <title>ProfitPulse Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="slideshow">
        <img src="slide1.jpg" class="slide active">
        <img src="slide2.jpg" class="slide">
    </div>

    <div class="overlay">
        <h1 style="color: #00ffcc;">ProfitPulse Dashboard</h1>

        <div id="entrepreneur-view" style="display:none; background: rgba(0,0,0,0.8); padding: 30px; border-radius: 15px; width: 500px; text-align: center;">
            <h2 style="color: #00d4ff;">Pitch Your Business</h2>
            <select id="city-dropdown" style="width: 100%; padding: 10px; margin-bottom: 15px;"></select>
            <textarea id="idea-text" placeholder="Enter your business idea..." style="width: 100%; height: 100px; padding: 10px; margin-bottom: 15px; border-radius: 5px;"></textarea>
            <div style="display: flex; gap: 10px; justify-content: center;">
                <button onclick="generate()" style="background: #007bff;">Preview Roadmap</button>
                <button onclick="publishPitch()" style="background: #28a745;">Publish for Investors</button>
                <button onclick="generatePDF()" style="background: #ffc107; color: black;">Download Report</button>
            </div>
            <div id="result" style="margin-top: 20px; text-align: left;"></div>
        </div>

        <div id="investor-view" style="display:none; background: rgba(0,0,0,0.8); padding: 30px; border-radius: 15px; width: 600px;">
            <h2 style="text-align: center; color: #2ecc71;">Live Pitches</h2>
            <div id="pitch-wall" style="max-height: 400px; overflow-y: auto;"></div>
        </div>
        
        <button onclick="window.location='index.html'" style="margin-top: 20px; background: none; border: 1px solid white; color: white; cursor: pointer;">Logout</button>
    </div>

    <script src="cities.js"></script>
    <script src="ai.js"></script>
    <script src="pdf.js"></script>
    <script src="script.js"></script>
</body>
</html>
